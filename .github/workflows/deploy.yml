name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Show build output
        run: ls -la && find . -not -path "*/node_modules/*" -name "*.html" 2>/dev/null; echo "---dirs---"; ls -la build/ 2>/dev/null || ls -la dist/ 2>/dev/null || echo "no build or dist folder found"

      - name: Find index.html
        run: find . -name "index.html" | grep -v node_modules

      - name: Copy index.html to 404.html
        run: cp ./build/client/index.html ./build/client/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
